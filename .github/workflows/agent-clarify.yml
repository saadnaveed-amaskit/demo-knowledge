name: agent-clarify

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'PLATFORM-REQUIREMENTS.md'
      - 'requirements/**'
  workflow_dispatch:
    inputs:
      file_path:
        description: "Path to requirements file to check (relative to repo root)"
        required: true

jobs:
  agent-clarify:
    name: Check agent clarity
    runs-on: claude-runner
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect requirements files
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ inputs.file_path }}" >> $GITHUB_OUTPUT
          else
            git fetch origin "$BASE_REF"
            FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD \
              | grep -E '^(PLATFORM-REQUIREMENTS\.md|requirements/.+\.md)$' || true)
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Check agent clarity
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILES: ${{ steps.detect.outputs.files }}
        run: |
          if [ -z "$FILES" ]; then
            echo "No requirements files changed — skipping agent clarity check."
            exit 0
          fi

          FAILED=0

          for FILE in $FILES; do
            echo "=== Checking agent clarity: $FILE ==="

            if [ ! -f "$FILE" ]; then
              echo "  ERROR: file not found — $FILE"
              FAILED=1
              continue
            fi

            {
              echo "You are a CI quality gate checking whether requirements are clear enough for an AI coding agent to implement without asking clarifying questions."
              echo ""
              echo "REQUIREMENTS DOCUMENT ($FILE):"
              echo "=============================="
              cat "$FILE"
              echo ""
              echo "TASK:"
              echo "Identify requirements that are too ambiguous for autonomous AI implementation."
              echo ""
              echo "A requirement is TOO AMBIGUOUS if an agent would need to stop and ask a human before starting because:"
              echo "- No measurable acceptance criterion exists (no observable outcome, threshold, or behavior to test against)"
              echo "- A domain term is used that is undefined anywhere in the document"
              echo "- The boundary between pass and fail is completely open to interpretation"
              echo "- A product decision is implicitly required but not made (e.g. 'some kind of dashboard')"
              echo "- A persona or entity is referenced that is not defined in the document or known project context"
              echo ""
              echo "Do NOT flag:"
              echo "- High-level requirements that are appropriately silent on implementation HOW"
              echo "- Requirements that are correct WHAT/WHY statements without specifying the mechanism"
              echo "- Normal functional requirements that an agent can reasonably infer a test for"
              echo ""
              echo "Keep the list tight. Only flag genuine blockers — ambiguities that would actually cause an agent to stop and ask."
              echo ""
              echo "Respond with exactly one of the following formats:"
              echo ""
              echo "If all requirements are clear enough:"
              echo "AGENT_CLARIFY: PASS"
              echo ""
              echo "If clarification is needed:"
              echo "AGENT_CLARIFY: FAIL"
              echo "Ambiguity 1: [line or short quote] — Question the agent would ask: <specific question>"
              echo "Ambiguity 2: ..."
            } > /tmp/claude-prompt-clarify.txt

            RESPONSE=$(claude --print "$(cat /tmp/claude-prompt-clarify.txt)")
            echo "$RESPONSE"

            if echo "$RESPONSE" | grep -q "AGENT_CLARIFY: FAIL"; then
              FAILED=1
            fi

            echo ""
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "agent-clarify FAILED — resolve ambiguities before merging."
            exit 1
          fi

          echo "agent-clarify PASSED."
