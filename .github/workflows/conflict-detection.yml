name: conflict-detection

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'PLATFORM-REQUIREMENTS.md'
      - 'requirements/**'
  workflow_dispatch:
    inputs:
      file_path:
        description: "Path to requirements file to check (relative to repo root)"
        required: true

jobs:
  conflict-detection:
    name: Detect requirement conflicts
    runs-on: claude-runner
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect requirements files
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ inputs.file_path }}" >> $GITHUB_OUTPUT
          else
            git fetch origin "$BASE_REF"
            FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD \
              | grep -E '^(PLATFORM-REQUIREMENTS\.md|requirements/.+\.md)$' || true)
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Detect requirement conflicts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILES: ${{ steps.detect.outputs.files }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "$FILES" ]; then
            echo "No requirements files changed — skipping conflict detection."
            exit 0
          fi

          FAILED=0

          for FILE in $FILES; do
            echo "=== Detecting requirement conflicts: $FILE ==="

            if [ ! -f "$FILE" ]; then
              echo "  ERROR: file not found — $FILE"
              FAILED=1
              continue
            fi

            # Extract only the lines that changed in this PR to focus Claude on new content
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              CHANGED_LINES="(manual dispatch — full file treated as the change)"
            else
              CHANGED_LINES=$(git diff "origin/$BASE_REF"...HEAD -- "$FILE" \
                | grep '^+' | grep -v '^+++' | sed 's/^+//' || true)
            fi

            {
              echo "You are a CI quality gate detecting logical conflicts between new requirements and existing requirements."
              echo ""
              echo "FULL REQUIREMENTS DOCUMENT ($FILE — current state including proposed changes):"
              echo "=============================================================================="
              cat "$FILE"
              echo ""
              echo "LINES ADDED OR CHANGED IN THIS PR:"
              echo "==================================="
              echo "$CHANGED_LINES"
              echo ""
              echo "TASK:"
              echo "Check whether any of the added or changed requirements logically conflict with requirements that already exist in the document."
              echo ""
              echo "A REAL CONFLICT means two requirements cannot both be satisfied simultaneously:"
              echo "- 'users cannot delete items' vs existing 'users can delete items'"
              echo "- 'all responses are real-time' vs existing 'all responses are async and batched'"
              echo "- 'only Admin may create entries' vs existing 'Pricing Team may create entries'"
              echo "- 'prices are in USD only' vs existing 'prices must support multiple currencies'"
              echo ""
              echo "Do NOT flag:"
              echo "- Requirements that are additive (they extend coverage, not contradict)"
              echo "- Requirements in different sections covering clearly different behaviors"
              echo "- Differences in specificity (a general req and a more specific one can coexist)"
              echo "- Style or wording inconsistencies"
              echo ""
              echo "Respond with exactly one of the following formats:"
              echo ""
              echo "If no conflicts found:"
              echo "CONFLICT_DETECTION: PASS"
              echo ""
              echo "If conflicts found:"
              echo "CONFLICT_DETECTION: FAIL"
              echo "Conflict 1: New requirement '[quote]' contradicts existing '[quote]' — they cannot both be satisfied because [reason]"
              echo "Conflict 2: ..."
            } > /tmp/claude-prompt-conflict.txt

            RESPONSE=$(claude --print "$(cat /tmp/claude-prompt-conflict.txt)")
            echo "$RESPONSE"

            if echo "$RESPONSE" | grep -q "CONFLICT_DETECTION: FAIL"; then
              FAILED=1
            fi

            echo ""
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "conflict-detection FAILED — resolve conflicts before merging."
            exit 1
          fi

          echo "conflict-detection PASSED."
